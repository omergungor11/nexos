<svg width="1920" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="skyline" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.06)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(234,179,8,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(234,179,8,0)"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="800" fill="#0f172a"/>
  <rect width="1920" height="800" fill="url(#grid)"/>
  <!-- City skyline silhouette -->
  <g fill="url(#skyline)">
    <rect x="100" y="500" width="80" height="300"/>
    <rect x="200" y="420" width="60" height="380"/>
    <rect x="280" y="460" width="90" height="340"/>
    <rect x="390" y="380" width="70" height="420"/>
    <rect x="480" y="440" width="100" height="360"/>
    <rect x="600" y="350" width="60" height="450"/>
    <rect x="680" y="400" width="80" height="400"/>
    <rect x="780" y="320" width="70" height="480"/>
    <rect x="870" y="370" width="100" height="430"/>
    <rect x="990" y="300" width="60" height="500"/>
    <rect x="1070" y="360" width="90" height="440"/>
    <rect x="1180" y="410" width="70" height="390"/>
    <rect x="1270" y="340" width="80" height="460"/>
    <rect x="1370" y="390" width="60" height="410"/>
    <rect x="1450" y="450" width="100" height="350"/>
    <rect x="1570" y="380" width="70" height="420"/>
    <rect x="1660" y="430" width="90" height="370"/>
    <rect x="1770" y="470" width="80" height="330"/>
  </g>
  <!-- Subtle golden glow -->
  <ellipse cx="960" cy="400" rx="600" ry="300" fill="url(#glow)"/>
</svg>
